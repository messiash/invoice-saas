version: "3"
services:
 mysql:
  image: mysql:8
  environment:
   MYSQL_ROOT_PASSWORD: root
   MYSQL_DATABASE: invoice_saas
  volumes:
   - dbdata:/var/lib/mysql
 backend:
  build: ./backend
  ports:
   - "5000:5000"
  depends_on:
   - mysql
 frontend:
  build: ./frontend
  ports:
   - "3000:3000"
 nginx:
  image: nginx
  ports:
   - "80:80"
  volumes:
   - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  depends_on:
   - backend
   - frontend
volumes:
 dbdata:
